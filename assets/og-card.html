<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>GhostFactory Workflows — social card</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  .og{width:1200px;height:630px;background:#0e0e10;position:relative;overflow:hidden;
      padding:76px 84px;display:flex;flex-direction:column;justify-content:space-between;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
  .base{position:absolute;left:0;bottom:0;width:100%;height:8px;background:#ff4535}
  .top{display:flex;align-items:center;gap:30px}
  .wmk{font-weight:800;letter-spacing:-1.5px;color:#fff;font-size:72px;line-height:1}
  .wmk span{color:#ff4535}
  .hook{font-size:34px;color:#eceef0;margin-top:34px;font-weight:600;letter-spacing:-.5px;line-height:1.2}
  .hook b{color:#ff4535;font-weight:600}
  .leadlbl{font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:16px;color:#5a5f66;letter-spacing:3px;margin-bottom:16px}
  .chips{display:flex;gap:14px;align-items:center}
  .ck{font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:21px;font-weight:600;color:#fff;padding:10px 20px;border-radius:9px;white-space:nowrap}
</style>
</head>
<body>
<div class="og">
  <div>
    <div class="top">
      <svg width="190" height="118" viewBox="10 6 132 82" aria-label="GhostFactory ghost and robot">
        <defs>
          <mask id="mg"><rect width="80" height="80" fill="#fff"/><rect x="27.5" y="30" width="5" height="12" rx="2.5"/><rect x="47.5" y="30" width="5" height="12" rx="2.5"/></mask>
          <mask id="mr"><rect width="80" height="80" fill="#fff"/><rect x="27" y="31" width="6" height="11" rx="3"/><rect x="47" y="31" width="6" height="11" rx="3"/></mask>
        </defs>
        <svg x="0" y="0" width="96" height="96" viewBox="0 0 80 80" overflow="visible"><path d="M 12 70 L 12 37 A 28 28 0 0 1 68 37 L 68 70 L 61 64 L 54 70 L 47 64 L 40 70 L 33 64 L 26 70 L 19 64 L 12 70 Z" fill="#ff4535" mask="url(#mg)"/></svg>
        <svg x="76.7" y="23.8" width="73" height="73" viewBox="0 0 80 80" overflow="visible"><g fill="#ff4535"><circle cx="40" cy="4.5" r="3"/><rect x="38.5" y="6" width="3" height="9" rx="1.5"/><path d="M 13 26 Q 13 14 25 14 L 55 14 Q 67 14 67 26 L 67 66 L 60.5 60 L 54 66 L 47 60 L 40.5 66 L 34 60 L 27 66 L 20 60 L 13 66 Z" mask="url(#mr)"/></g></svg>
      </svg>
      <div class="wmk">GhostFactory <span>Workflows</span></div>
    </div>
    <div class="hook">When agents create most of your issues, your backlog needs a system.<br><b>Templates &rarr; Agent &rarr; Triage &rarr; Human.</b></div>
  </div>
  <div>
    <div class="leadlbl">ONE LANE &middot; ONE TYPE &middot; TRIAGE CHECKPOINT</div>
    <div class="chips">
      <span class="ck" style="background:#DC2626">Bug</span>
      <span class="ck" style="background:#2563EB">Feature</span>
      <span class="ck" style="background:#7C3AED">Discovery</span>
      <span class="ck" style="background:#D97706">Follow-up</span>
      <span class="ck" style="background:#6B7280">Tech Debt</span>
      <span class="ck" style="background:#9CA3AF">Chore</span>
    </div>
  </div>
  <div class="base"></div>
</div>
</body>
</html>
